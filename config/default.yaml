# =============================================================================
# skill_pipeline 统一配置文件
# 所有路径、阈值、magic number 集中在此，不要在代码中硬编码。
# =============================================================================

# ========== 路径配置 ==========
paths:
  # ---- 输入路径 ----
  paper_pdf_dir: "/data/guyuxuan/agent/paper_pdf"
  paper_markdown_dir: "/data/guyuxuan/agent/paper_md"

  # ---- 中间产物 / 工作目录 ----
  sandbox_root: "./data/end_sandbox"
  code_cleaner_workdir: "./artifacts/code_cleaner"

  # ---- 输出路径 ----
  task_descriptions_dir: "./data/task_descriptions"
  reports_dir: "./reports"

  # ---- Skills 存储路径 ----
  skills_active_dir: "./.claude/skills"
  skills_draft_dir: "./skills/library/drafts"
  skills_registry: "./skills/library/registry.json"
  skills_code_pool: "./skills/library/code_pool"
  skills_embedding_model_dir: "./skills/embeddings/all-MiniLM-L6-v2"
  trajectories_dir: "./data"                     # 轨迹存储根目录: data/<task>/trajectories/

# ========== Pipeline 参数 ==========
pipeline:
  max_retries: 5                     # 主循环最大重试次数
  execution_timeout: 1200             # solver 执行超时（秒）
  syntax_check_timeout: 30           # 语法检查超时（秒）
  max_history_len: 3                 # 保留失败历史条数
  code_size_guard: 12000             # 代码膨胀上限（字符数）

# ========== 评估阈值 ==========
evaluation:
  min_ncc: 0.85                      # NCC >= 0.85 通过
  max_nrmse: 0.5                     # NRMSE <= 0.5 通过

# ========== Code Cleaner ==========
code_cleaner:
  llm_enabled: true
  llm_required: true
  llm_temperature: 0.0
  llm_max_tokens: 16000
  llm_max_loops: 3
  force_rebuild_env: false
  data_gen_timeout: 180              # 数据/测试脚本生成执行超时（秒）
  data_gen_max_retries: 5            # 数据生成最大重试
  gt_code_snippet_limit: 4000        # GT 代码截取字符数
  env_setup:
    conda_path: null                   # null = 自动检测
    envs_dir: "./test_conda_envs"      # 环境存放目录（--prefix 模式）
    python_version: "3.10"
    env_prefix: "task_"                # 环境命名前缀: task_<folder_name>
    max_fix_retries: 3                 # LLM 诊断修复最大轮次
    pip_install_timeout: 600           # pip install 超时（秒）
    verify_timeout: 30                 # import 验证超时（秒）
    torch_cuda_index_url: "https://download.pytorch.org/whl/cu124"  # PyTorch CUDA wheel index

# ========== Skills 系统 ==========
skills:
  retrieval_enabled: false            # 只读开关：允许检索已有 skills（default=true）
  learning_enabled: false            # 可写开关：允许从轨迹学习（default=false，implies retrieval_enabled=true）
  retrieval:
    max_token_budget: 2000           # 检索 token 预算上限
    similarity_threshold: 0.60       # 注入的相似度门槛（embedding cosine sim）
    max_items: 5                     # 最多注入条数
    top_k_planner: 3                 # Planner agent 检索条数
    top_k_coder: 4                   # Coder agent 检索条数
  learning:
    merge_similarity_threshold: 0.75 # 相似 skills 合并阈值
    max_skills_per_distillation: 10  # 单次蒸馏最大 skills 数
  generator:
    temperature: 0.3                 # skills_generator agent 温度
    max_tokens: 16000                # skills_generator agent max_tokens
    max_loops: 3                     # skills_generator agent 续写循环
  embedding:
    model_name: "all-MiniLM-L6-v2"
    dimension: 384

# ========== Agent 参数 ==========
agents:
  planner:
    temperature: 0.7
    max_tokens: 32768
    max_loops: 5
  critic:
    max_retries: 3
    temperature: 0.7
  architect:
    temperature: 0.7
  coder:
    max_retries: 3
    temperature: 0.2
  judge:
    temperature: 0.7

# ========== Task Description 生成 ==========
task_gen:
  default_user_prompt: "Generate a detailed task_description for the scientific coding pipeline. Use the required user prompt as the primary source of truth, and incorporate any available paper markdown, cleaned code, README, configs, and tests into a clear implementation-ready specification."
  paper_markdown_char_limit: 40000
  generator:
    system_prompt_path: "./agents/prompts/task_generator_system.txt"
    temperature: 0.0
    max_tokens: 16000
    max_loops: 3
