paths:
  paper_pdf_dir: "./data/paper_pdf"
  paper_markdown_dir: "./data/paper_markdown"
  sandbox_root: "./data/end_sandbox"
  code_cleaner_workdir: "./artifacts/code_cleaner"
  task_descriptions_dir: "./data/task_descriptions"
  reports_dir: "./reports"
  skills_active_dir: "./.claude/skills"
  skills_draft_dir: "./skills/library/drafts"
  skills_registry: "./skills/library/registry.json"
  skills_code_pool: "./skills/library/code_pool"
  skills_embedding_model_dir: "./skills/embeddings/all-MiniLM-L6-v2"
  trajectories_dir: "./data/trajectories"

pipeline:
  max_retries: 5
  execution_timeout: 1800
  syntax_check_timeout: 30
  max_history_len: 3
  code_size_guard: 12000

evaluation:
  min_ncc: 0.85
  max_nrmse: 0.5

code_cleaner:
  llm_enabled: true
  llm_required: true
  llm_temperature: 0.0
  llm_max_tokens: 16000
  llm_max_loops: 3
  force_rebuild_env: false
  data_gen_timeout: 180
  data_gen_max_retries: 5
  gt_code_snippet_limit: 4000
  env_setup:
    conda_path: null
    envs_dir: "./test_conda_envs"
    python_version: "3.10"
    env_prefix: "task_"
    max_fix_retries: 3
    pip_install_timeout: 600
    verify_timeout: 30
    torch_cuda_index_url: "https://download.pytorch.org/whl/cu124"

skills:
  enabled: false
  retrieval_enabled: false
  learning_enabled: false
  retrieval:
    max_token_budget: 10000
    similarity_threshold: 0.05
    max_items: 12
    top_k_planner: 10
    top_k_coder: 10
    max_permanent: 5
    max_draft: 12
  learning:
    merge_similarity_threshold: 0.55
    max_skills_per_distillation: 6
  generator:
    temperature: 0.3
    max_tokens: 16000
    max_loops: 3
  embedding:
    model_name: "all-MiniLM-L6-v2"
    dimension: 384

agents:
  planner:
    temperature: 0.7
    max_tokens: 32768
    max_loops: 5
  critic:
    max_retries: 3
    temperature: 0.7
  architect:
    temperature: 0.7
  coder:
    max_retries: 3
    temperature: 0.2
  judge:
    temperature: 0.7

task_gen:
  default_user_prompt: "Generate a detailed task description for the scientific coding pipeline. Use the required user prompt as the primary source of truth, and incorporate any available paper markdown, cleaned code, README, configs, and tests into a clear implementation-ready specification."
  paper_markdown_char_limit: 40000
  generator:
    system_prompt_path: "./agents/prompts/task_generator_system.txt"
    temperature: 0.0
    max_tokens: 16000
    max_loops: 3
